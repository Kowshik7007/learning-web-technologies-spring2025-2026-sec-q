<!DOCTYPE html>
<html>
<head><title>Task 7 - Profile Picture</title></head>
<body>
    <form onsubmit="return validateProfilePic()">
        <label>User Id</label>
        <input type="text" id="userid"><br><br>
        
        <label>Picture</label>
        <input type="file" id="picture"><br><br>

        <input type="submit" value="Submit">
    </form>

    <script>
        function validateProfilePic() {
            let userId = document.getElementById('userid').value;
            let picture = document.getElementById('picture').value;

            if (userId === "" || isNaN(userId) || Number(userId) <= 0) {
                alert("UserId cannot be empty and has to be a positive number.");
                return false;
            }
            if (picture === "") {
                alert("Picture cannot be empty.");
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
