<!DOCTYPE html>
<html>
<head><title>Task 8 - Person Profile</title></head>
<body>
    <h2>PERSON PROFILE</h2>
    <form onsubmit="return validateProfile()">
        <table border="1" cellpadding="5">
            <tr>
                <td>Name</td>
                <td><input type="text" id="p_name"></td>
            </tr>
            <tr>
                <td>Email</td>
                <td><input type="text" id="p_email"></td>
            </tr>
            <tr>
                <td>Gender</td>
                <td>
                    <input type="radio" name="p_gender" value="Male"> Male
                    <input type="radio" name="p_gender" value="Female"> Female
                    <input type="radio" name="p_gender" value="Other"> Other
                </td>
            </tr>
            <tr>
                <td>Date of Birth<br>(dd/mm/yyyy)</td>
                <td>
                    <input type="text" id="p_dd" size="2"> /
                    <input type="text" id="p_mm" size="2"> /
                    <input type="text" id="p_yyyy" size="4">
                </td>
            </tr>
            <tr>
                <td>Blood Group</td>
                <td>
                    <select id="p_bg">
                        <option value="">--Select--</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="O+">O+</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Degree</td>
                <td>
                    <input type="checkbox" name="p_degree" value="SSC"> SSC
                    <input type="checkbox" name="p_degree" value="HSC"> HSC
                    <input type="checkbox" name="p_degree" value="BSc"> BSc.
                    <input type="checkbox" name="p_degree" value="MSc"> MSc.
                </td>
            </tr>
            <tr>
                <td>Photo</td>
                <td><input type="file" id="p_photo"></td>
            </tr>
            <tr>
                <td colspan="2" align="right">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>
            </tr>
        </table>
    </form>

    <script>
        function validateProfile() {
            // 1. Name Validation
            let name = document.getElementById('p_name').value.trim();
            if (name === "" || !/^[a-zA-Z]/.test(name) || name.split(/\s+/).length < 2 || !/^[a-zA-Z.\- ]+$/.test(name)) {
                alert("Invalid Name. Cannot be empty, must be >=2 words, start with a letter, and contain only a-z, A-Z, dot or dash.");
                return false;
            }

            // 2. Email Validation
            let email = document.getElementById('p_email').value.trim();
            let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (email === "" || !emailRegex.test(email)) {
                alert("Invalid Email.");
                return false;
            }

            // 3. Gender Validation
            let genderSelected = false;
            let genders = document.getElementsByName('p_gender');
            for (let i = 0; i < genders.length; i++) {
                if (genders[i].checked) genderSelected = true;
            }
            if (!genderSelected) {
                alert("Please select a Gender.");
                return false;
            }

            // 4. DOB Validation
            let dd = document.getElementById('p_dd').value;
            let mm = document.getElementById('p_mm').value;
            let yyyy = document.getElementById('p_yyyy').value;
            if (dd === "" || mm === "" || yyyy === "" || isNaN(dd) || dd < 0 || dd > 31 || isNaN(mm) || mm < 1 || mm > 12 || isNaN(yyyy) || yyyy < 1900 || yyyy > 2016) {
                alert("Invalid Date of Birth.");
                return false;
            }

            // 5. Blood Group Validation
            if (document.getElementById('p_bg').value === "") {
                alert("Please select a Blood Group.");
                return false;
            }

            // 6. Degree Validation
            let degreeSelected = false;
            let degrees = document.getElementsByName('p_degree');
            for (let i = 0; i < degrees.length; i++) {
                if (degrees[i].checked) degreeSelected = true;
            }
            if (!degreeSelected) {
                alert("Please select at least one Degree.");
                return false;
            }

            // 7. Photo Validation
            if (document.getElementById('p_photo').value === "") {
                alert("Photo cannot be empty.");
                return false;
            }

            alert("Form submitted successfully!");
            return true;
        }
    </script>
</body>
</html>
