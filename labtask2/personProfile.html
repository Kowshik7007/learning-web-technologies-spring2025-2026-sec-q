<!DOCTYPE html>
<html>
<head>
<title>Task 8 - Person Profile</title>
</head>
<body>

<h2>PERSON PROFILE</h2>

<form onsubmit="return validateProfile()">
<table border="1" cellpadding="5">

<tr>
<td>Name</td>
<td><input type="text" id="p_name"></td>
</tr>

<tr>
<td>Email</td>
<td><input type="text" id="p_email"></td>
</tr>

<tr>
<td>Gender</td>
<td>
<input type="radio" name="p_gender" value="Male"> Male
<input type="radio" name="p_gender" value="Female"> Female
<input type="radio" name="p_gender" value="Other"> Other
</td>
</tr>

<tr>
<td>Date of Birth<br>(dd/mm/yyyy)</td>
<td>
<input type="text" id="p_dd" size="2"> /
<input type="text" id="p_mm" size="2"> /
<input type="text" id="p_yyyy" size="4">
</td>
</tr>

<tr>
<td>Blood Group</td>
<td>
<select id="p_bg">
<option value="">--Select--</option>
<option value="A+">A+</option>
<option value="A-">A-</option>
<option value="B+">B+</option>
<option value="O+">O+</option>
</select>
</td>
</tr>

<tr>
<td>Degree</td>
<td>
<input type="checkbox" name="p_degree" value="SSC"> SSC
<input type="checkbox" name="p_degree" value="HSC"> HSC
<input type="checkbox" name="p_degree" value="BSc"> BSc.
<input type="checkbox" name="p_degree" value="MSc"> MSc.
</td>
</tr>

<tr>
<td>Photo</td>
<td><input type="file" id="p_photo"></td>
</tr>

<tr>
<td colspan="2" align="right">
<input type="submit" value="Submit">
<input type="reset" value="Reset">
</td>
</tr>

</table>
</form>

<script>

function validateProfile() {

// 1️⃣ Name Validation
let name = document.getElementById("p_name").value.trim();

if(name === ""){
alert("Name cannot be empty");
return false;
}

// first character must be a letter
let first = name.charCodeAt(0);
if(!((first>=65 && first<=90) || (first>=97 && first<=122))){
alert("Name must start with a letter");
return false;
}

// check allowed characters
for(let i=0;i<name.length;i++){
let c = name[i];

if(!(
(c>='a' && c<='z') ||
(c>='A' && c<='Z') ||
c==='.' ||
c==='-' ||
c===' '
)){
alert("Name can contain only letters, dot, dash and space");
return false;
}
}

// check at least two words
let parts = name.split(" ");
let count = 0;
for(let i=0;i<parts.length;i++){
if(parts[i] !== "") count++;
}

if(count < 2){
alert("Name must contain at least two words");
return false;
}


// 2️⃣ Email Validation
let email = document.getElementById("p_email").value.trim();

if(email === ""){
alert("Email cannot be empty");
return false;
}

if(email.indexOf(" ") !== -1){
alert("Email cannot contain spaces");
return false;
}

let at = email.indexOf("@");
let dot = email.lastIndexOf(".");

if(at <= 0 || dot <= at+1 || dot === email.length-1){
alert("Invalid Email format");
return false;
}


// 3️⃣ Gender Validation
let genders = document.getElementsByName("p_gender");
let genderSelected = false;

for(let i=0;i<genders.length;i++){
if(genders[i].checked){
genderSelected = true;
}
}

if(!genderSelected){
alert("Please select Gender");
return false;
}


// 4️⃣ DOB Validation
let dd = Number(document.getElementById("p_dd").value);
let mm = Number(document.getElementById("p_mm").value);
let yyyy = Number(document.getElementById("p_yyyy").value);

if(isNaN(dd) || dd<1 || dd>31){
alert("Invalid Day");
return false;
}

if(isNaN(mm) || mm<1 || mm>12){
alert("Invalid Month");
return false;
}

if(isNaN(yyyy) || yyyy<1900 || yyyy>2016){
alert("Invalid Year");
return false;
}


// 5️⃣ Blood Group
if(document.getElementById("p_bg").value === ""){
alert("Please select Blood Group");
return false;
}


// 6️⃣ Degree Validation
let degrees = document.getElementsByName("p_degree");
let degreeSelected = false;

for(let i=0;i<degrees.length;i++){
if(degrees[i].checked){
degreeSelected = true;
}
}

if(!degreeSelected){
alert("Please select at least one Degree");
return false;
}


// 7️⃣ Photo Validation
if(document.getElementById("p_photo").value === ""){
alert("Please upload a photo");
return false;
}

alert("Form submitted successfully!");
return true;

}

</script>

</body>
</html>
