<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
    <style>
        #board{
            display:grid;
            grid-template-columns:repeat(3,100px);
            gap:5px;
        }

        .cell{
            width:100px;
            height:100px;
            border:1px solid black;
            font-size:40px;
            text-align:center;
            line-height:100px;
            cursor:pointer;
        }

        #status{
            margin:15px 0;
            font-size:20px;
        }
    </style>
</head>

<body>

<h2>Tic Tac Toe</h2>

<div id="status">Current Player: X</div>

<div id="board">
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
</div>

<br>
<button id="reset">Reset Game</button>

<script src="script.js"></script>

</body>
</html>
